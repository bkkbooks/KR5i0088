front:
  text: 關帝忠孝忠義經三界伏魔關聖帝君忠孝忠義眞經三界伏魔關聖帝君忠孝忠義眞經誦經要訣
  hash: sha256:352cda0c8591f70814f3d40d56b79cbd543b5face9f4ae7cbba46b4a9e235e2c
  markers:
  - {type: page-break, offset: 21, content: '', id: CK-KZ_KR5i0088_01p087a}
body:
  text: 凡欲誦經必先興同水潄淸淨焚香嚴肅衣冠平身端坐洗心滌慮絶念忘機正氣調聲思眞如對然後持念淨口神咒丹朱口神吐穢除氛舌神正倫通命養神羅千齒神卻邪衛眞喉神虎賁氣神引津心神丹元令我通眞思神鍊液正氣常存淨心神咒太上台星應變無停驅邪縛魅保命護身智慧明靜心神安甯三魂永久魄無喪傾淨身神咒靈寶天尊安慰身形弟子魂魄五臟玄冥靑龍白虎隊仗紛紜朱雀玄武侍衛我眞安土地神咒元始安鎭普告萬靈嶽瀆眞官土地祇靈左社右稷不得妄驚囘向正道内外澄淸各安方位備守家庭太上有命搜捕邪精護法神王保衛誦經皈依大道元亨利貞淨壇神咒法水淨壇壇滿香雲心氣合誠持劍步虛洒成法雨功懸靑史神出紫霄雕琢靑龍時時若吼行空赤馬萬里騰雲三界瞬息六合匪遙治世經文揭帝神咒持誦一遍神鬼肅欽五嶽潛行四海澄淸散花朝禮道氣常存祝香文玉花散景九炁凝烟香雲宻羅逕冲九天令臣長生世爲神仙所啓所願咸賜如言長跪禮奉仰啓三淸境無上三境尊仰啓大羅天無上玄穹主仰啓三淸界侍宸諸聖眾妙道難思議造入資玄門妙經抉玄藴導引塵迷趣臣今淨三業口誦及心持唯願大慈悲開受臣所請慈光燭卑賤聰聽聆音聲願臣諷誦時響徹十方界成就一切願如經所稱述從此漸進修成道事諸聖長跪朝眞志心懴悔臣等自從無始刦無明煩惱覆眞心常行殺盜與邪淫兩舌妄言並綺語誹謗大乘眞正教鬬亂親朋離間人貪嗔癡愛縱三心喜怒愛惡增七慢厯刦罪愆難記憶多生業垢莫能量皈依上聖大慈悲發露眞心伸懴悔萬刦千生諸罪垢從今懴悔悉消除將此身心奉上聖惟願罪根悉原宥多刦多生罪消滅懴悔己後罪滅福生稽首禮謝無上虛皇至眞三寶志心發願願眼常覩玉毫相願耳常聞說法聲願鼻常嗅眾妙香願舌常讚無上道願身不染邪淫穢願意常存敬信心發願上報四重恩發願下濟三途苦廣運慈悲憐一切廣行方便度眾生仰惟上聖大慈悲加護願心悉成就發願己後罪滅福生稽首禮謝無上虛皇至眞三寶關聖帝君誥太上神威英文雄武精忠大義高節淸廉協運皇圖德崇演正掌儒釋道教之權管天地人才之柄上司三十六天星辰雲漢下轄七十二地土壘幽酆秉注生功德延夀丹書執定死罪過奪命黑籍考察諸佛諸神監制羣仙羣職高證妙果無量度人至靈至聖至上至尊伏魔大帝關聖帝君大悲大願大聖大仁貞元顯應光昭翊漢靈佑天尊三界伏魔關帝忠孝護國翊運眞經爾峕帝尊與諸大天尊及天龍鬼王曁諸大將軍同時集會觀見眾生億刼漂淪生死輪迴悲苦萬狀轉乖人道深爲可憫帝尊言原始人生未有端倪幻兮冥兮寂無朕兮自得二炁受精於父受胎於母拊循畜育教養獲成策命於君析圭擔爵乃爲成人汝等眾生若無二親何以成形若無君王何以貴顯如彼草木不灌不培何以生長如彼築室不增不壘何以成室如彼璞玉不雕不琢何以成玉如彼道德不顯不露孰爲文章爾等眾生或賤或貧或夭或亡或遭水火或斃雷擊或廢於疾病或死於兵革或歹莩於飢荒或䧟於罪或戕於猛獸或墮於地獄皆緣夙世悖倫亂紀大逆不道或罵父母或欺君長以是義故種種煩惱種種蝟襍曾爲逆報汝等眾生當鑑世苦敦修倫紀一者念罔極親恩等之天地二者念浩蕩君恩等之覆載三者念劬勞之苦撫字萬端四者念寵錫之隆喜逾百朋五者念式穀之訓期琞惓惓六者念推轂之任戒命殷殷七者念身體髮膚血脈流貫八者念股肱心膂誼同一體九者念身因親有捐體難報十者念顯因君來舍身莫酬不問貴賤不問賢愚咸有君親咸當忠孝汝等眾生或用色養或用物養或慷慨赴義或見危受命或靖共爾位或調和鼎鉉或侃侃盡瘁或停停物表或心如金石或精忠貫日或塞外植節或抗志虜庭或鼎鑊不避或裏屍馬葬是等是人揚芳萬年生而不死死而不亡炳炳忠孝亘天不磨或命終時當爲天大元師天大將軍天大神王永無輪迴永無百刼爾等眾生齋心靜慮焚香捧讀或口誦心維或作躬行是人若在貧賤當於貧賤爲之保護若在夭亡當於夭亡爲之保護若在水火當於水火爲之保護若在雷擊當於雷擊爲之保護若在疾病當於疾病爲之保護若在兵革當於兵革爲之保護若在飢荒當於飢荒爲之保護若在罪當於罪爲之保護若在猛獸當於猛獸爲之保護若在地獄當於地獄爲之保護所獲福聚無量無邊能於苦海千百億刦中拔濟眾生眞實不虛說是經義名曰忠孝而說偈云忠孝立身本卽此是修義完全是行果不實如禽獸無量諸法門悉惟一念起遠離諸罪垢從斯得解脫爾時飛天神王及諸大將軍一切大眾聞說是經皆大歡喜稽首帝尊奉辭而退正一冲玄孚感靈章伏魔關聖翻倒乾坤掌大之權眞君之威呼吸雷霆撼動山川吾誓到處斷絶邪源刀持在手呼聖集仙敢有不至寸斬無原雷霆速奔黃鉞钁天汝負重誓律準太玄關帝伏魔護道彰感誓章吾是天上靈挐風捉鬼神大刀兵百萬佐道輔天行正心行吾法吾必合汝心持心終始一吾必親現形由汝役使我變化如沙塵分身千百萬隨處救天民勤心奉吾者永結爲弟兄遣吾斡霖雨掣電轟雷霆遣吾誅妖孼斬頭滴血呈遣吾打丁你人你亻你亻魂魄昇天入地尋遣吾捉邪崇速縛來現形遣吾散禍難風火無暫停遣吾救疾病親爲五臟神三台調正氣萬病自安甯盡心皈我教衟法永隆興亥日是吾降香火宜精勤汝若負吾者風刀斬爾形我若負汝者永滅精氣神功成行滿日同步朝上淸急急如律令心有天遊室無空虛心有畏敬吉祥自生作善修德猶谷傳聲忠義經序關夀亭侯忠義經十九章皆侯自製也晉陳夀演俗通義似近鄙褻茲宋學士孫奭編述南渡中丞張守訂梓相傳五百餘年漫無可稽世人亦不知有是經也維侯忠義昭㝢宙功烈垂史冊祠祀遍天下黃髮稚齒極海窮邊靡不崇重而侯之隨在著靈威英顯赫千載一日博幸生同侯鄕藉侯庇久嘉靖丙辰巡撫荆楚荆故侯保障區迄今家至左聯頂禮如在比還省辭楚王殿下王詢侯故里事復出忠義經示博拜賜踴躍若侯陟降也歸舟檢閱後先紊敘簡篇遺逸字畫錯亂差訛遂爲校定重錄首揭侯像并述侯辭曹之書後人仰侯之贊𢑥成一帙𢹂之京師繼役關中未遑鋟梓適都督劉顯移兵守川廣因以貽之俾刻荒鎭以作士氣以風忠義且播之天下瞻奉者有所持誦則傚云兵部尙書蒲州楊博敘事關聖帝君濟世消災集福忠義經述志章第一關聖帝曰吾本東漢解良居民黃巾作亂天下招兵觀牓涿郡偶遇劉張桃園結義生死不忘吾習春秋吾知武藝始除黃巾三戰吕布許田射鹿投鼠忌器土基被困失散兄弟曹操奸雄奏封夀亭吾奉二嫂吾思兄弟誅良斬醜挂印辭曹霸陵橋上挑起錦袍吾宿義司明燭達旦獨行千里五關斬將吾斬蔡陽古城會敘後遇子龍周倉歸義冐雪隆中三顧臥龍義釋曹操恕斬黃忠領牧荆州勸農講學單刀赴會談笑自若赤壁鏖戰水渰七軍生擒龎德華夏威名初封前軍繼加五虎定鼎西川盪寇神武吾無所長惟持忠義扶漢誅奸死無畏避吾年近六有命在天視我赤心聽我微言爲子盡孝爲臣盡忠父慈母愛兄友弟恭夫婦倡隨朋友信義鄕鄰婢僕眞誠和氣吾言淺近切用身心爲士爲官爲將爲兵持誦吾言扶助功名爲農爲工爲商爲賈持誦吾言利盈十五出海入山行軍滅寇持誦吾言凱歌捷奏惟爾兵將尤我所矜至誠持誦精神照臨民有貴賤患病犯刑家庭道路交易婚姻盜賊水火搆訟鬬爭至誠持誦諸事咸甯平生立心惟此忠義世人欺險吾所鄙棄况復天君酆都諸神日巡夜察赫赫威靈鴻濛章第二鴻濛元始天地未分大化一體布氣十分成就萬象負抱陰陽陽餘爲男陰餘爲女化化生生迺有倫理宿命因緣有善有惡長短貴賤富貧厚薄所作之報如影逐形種蘭得香種粟得糧皆係所業降福降殃頂天履地五行正氣妙道在人不可輕棄保之甚難失之甚易若迷正道必入邪源貪嗔淫殺地獄永淹皆由眾生自作自受諦聽吾言免淪凶咎孝順父母和同六親盡忠秉節不犯天刑五體具足十相端成世間萬物最貴爲人氣數章第三人稟氣數乃得生身風土不同稟受自異故謂之氣智愚不同淸濁殊度故謂之數數係于禽氣係于天務須學道以全其元愚可以智濁可以淸諦聽吾言勿虛爾生世道章第四吾嗟世道不忠不孝不敬師長不睦兄弟夫婦不諧朋友不義天地不尊神明不懼五穀不重三光不避小秤大斗殺生害命奸淫詐逆積微成著如此等人神明厭棄先奪其魂後殺其體舉世昏迷自謂得計一旦無常委之天地諦聽吾言玩此眞味居處章第五人生居處平安爲福勿佔害人勿施暗毒不循理法蛇虫嫁孼鳥鼠送妖抛磚打石驚雞弄狗影脇夢逼更加姦盜踰牆穴隙庭戸不甯小大惶惑夜嘯其梁晝瞰其室牛馬六畜亦遭瘟疫弔客頻仍禍連骨肉喪車叠且互出悲號泣哭諦聽吾言轉禍爲福配育章第六世人配育宜重合婚三刑六害隔角交侵咸池天狗寡宿孤辰艱於嗣息遂至絕倫不知生時太乙在門聖母衛房司命在庭或有𡨚愆鬼魅禁忌致於難産母子俱廢諦聽若言平日心田光明正大凶禍不纒多生賢子以賦螽斯臨盆有慶坐草無虞修建章第七世人修建不識陰陽九壘七煞犯之必傷太嵗將軍鶴神太白金神劍鋒九良七煞黃旛豹尾飛廉刀砧土家眷屬一切鬼神若値興工有一不戒病患喪亡官符横害諦聽吾言修德作善天地無嗔陰陽無碍百神呵護永世昌大功名章第八士人功名質賦於天落落數奇弗顯弗達得意者忻失意者戚寒窗苦讀黎火久被鏖戰枉攻主司不契吾蒞文場升沈益利三峽詞源如流瀉水諦聽吾言昌期世際入彀英雄出類拔萃游行章第九軍民游行尤所當備下寨安營出師對壘須識風雲堅持忠義矢心報效鬼神呵衛盜賊騁奸風波係累深山窮谷虎狼魈蜮大海長江蛟龍可畏幽枉有魂刼數有會捉生代死鬼妖爲祟游行遭遇何以處之中心正直平生所持諦聽吾言謹愼行之符訟章第十人有符訟亦命所値天地年月日主時刻赤口白舌皆有神司出入動舉避忌須知朝有擊䀨夜有剪煼面是背非雀角鼠憂怨詈咒咀獄訟繁興謗讟詆詬刑憲具存諦聽吾言自反其心作好作惡皆由已生疾病章第十一人有疾病積久弗瘳沈疴枕席其故何由一心不明五神無主三生有刦四大不舉平日觸犯古聖先賢三光七曜廟社霛壇城隍香火井灶第宅起居不淨供奉不職冥魂𡨚枉牽纒咀盟前生結釁怨債交征諦聽吾言將心比心他時執對及今分明命運章第十二人稟命運萬有不齊富貴貧賤各安其軀五行奇蹇九曜更變年逢刑冲運或尅戰孤辰寡宿羊刄劍鋒祿逢于敗馬落于空動用凶危行藏坎壈何以禳禦自反自省三官解災五方解厄諦聽吾言順守不忒攝生章第十三人之攝生須明道要能屏眾緣永除諸害外想不入内想不出五臟淸涼六腑調泰引炁太和注潤身田仍節飮食法藥保延驅遣三尸安寂六根静照八識澄妙三元諦聽吾言以永無愆瘟瘵章第十四天地瘟疫二十有五天地蠱毒二十有四癆瘵之疾三十有六遭此大患厥有其故其故伊何伏屍故炁感召深染塜訟墓注諦聽吾言淸心告天上通三界下徹九泉追薦魂爽超度祖玄非藥可療治在心田太樸章第十五太樸旣散仁義乃興禮樂旣作奸邪斯行六義旣失四民有爭上不寬恕下不忠貞全家疾病死亡橫生消耗財物累𡻕官刑性命枉逝災害相仍穢雜交染骨肉伶仃如此人世那能安平諦聽吾言敦敘五倫從謙從厚必信必誠守法安分勿貪勿爭災消禍減百福咸臻慾界章第十六吾觀慾界眾生無情不忠不孝不義不仁作多惡業全無悔心綱維圯裂大數自傾兵火肆超玉石俱焚凶荒洪水苛政煩刑備諸苦惱生意滅絶人道將窮何由解脱諦聽吾言勿肆以貪忠孝仁義永寶勿愆一切善惡皆由心造爲善福生爲惡禍到雨暘章第十七天有雨暘時有豐荒雨澤愆期亢旱爲殃祝融扇禍赤鼠遊城海若失經魚鱉妄行天災流行世所常有諦聽吾言修德以候順天知時聽其自來勤儉畏敬自免凶災生人章第十八世之生人賦受上蒼東斗主算西斗紀名北斗落死南斗上生中斗大魁總監眾靈靑帝護魂白帝持魄赤帝養氣黑帝通血黃帝中主萬神無越𦕈𦕈億刦混沌之中幽冥形影寥廓無窮玉帝攝氣靈風聚烟千和萬合自然成眞眞中有神長生大君諦聽吾言珍愛爾生業報章第十九世之業報何事而成刻薄一心雜亂三情更生疑惑所爲昏昧恃惡邪行背眞就僞不仁不義違天逆地欺君伐主不忠不智無愛無慈奸妄侵肆殘虐百姓殺戮眾生嗜戕物命結諸罪𡨚如此作業𡨚對無邊動見患難不可縷數橫禍傷生備受哀苦萃諸惡業來豈無因人之行事鬼神監臨乘汝罪釁加爾陰刑眾生不知猶是妄行諦聽吾言安分保生無欺無險無盜無淫存心守己香火咸甯念念弗失福爾終身關聖帝君濟世消災集福忠義經終關聖寶誥關聖大天尊伏魔眞上帝靈著玉泉山英風常震世至大與至剛浩然成正氣砥柱立綱常日月揭心事頭帶九旒冠衣穿龍衮袍足攝紫雲履腰懸白玉縧人間察善惡雷部與天曹生殺惟所令靑龍偃月刀一念自霛通不從修證入非玄亦非牝太極本無極元始肇天尊救苦同太乙眞君古來傳崇甯推至德關帝寶懴臣聞帝闕巍峩玉殿玲瓏仙花燦爛鸞鶴飛鳴粧嚴寶座聖化流行文衡武備監察分明統成三教克盡五常大災能捍大患能禦大義不屈大節不移語大則布盡法界語小則歛入微塵精誠貫格赫奕威靈邪精鬼賊盡自消滅毒龍猛獸各得藏形嶽生芝草海吐蜃樓治世淸平景星卿雲懴悔無極無極大道志心朝禮上詣三淸天尊中檢圖籙大帝下筞地祇大帝三界伏魔大帝南極協天大帝赤心衛國大帝酆都朗靈大帝護法伽藍大帝合司文武大帝錫福延生大帝乾坤正氣天尊忠貞貫日天尊紫微協運天尊神威遠震天尊扶持社稷天尊澄淸海甸天尊蠻夷畏服天尊令人忠義天尊令人孝敬天尊在在昭明天尊處處感應天尊消災釋罪天尊消除業識天尊寶華圓滿天尊伏以天道昭彰六天道行貞固不散神妙體物困而能守漸得光明賤而不苟漸得營生富者莫驕貴者莫淫懷刑者枷鎖不聞奉佛者妖孼不侵正直者懲善可稱布施者錫福延生善哉善哉懴悔虔誠酌水獻花誕登上淸上至帝王下及庶民皆大懽喜信受奉行關聖帝君寶懴終履厯事實帝君名羽字長生改字雲長蒲州解良人生於漢桓帝景熹三年庚子五月十三日午時靈帝中平元年甲子二月桃園結義獻帝初平二年辛未拜別部司馬加五虎將軍後加前將軍建安二十年乙未封盪寇將軍領荆州牧二十四年已亥十二月卒於麥城年六十𡻕葬於湖廣承天府當陽縣西漳鄕唐高宗儀鳳元年玉泉山顯聖六祖惠能建寺立爲伽藍宋仁宗至和二年封崇甯眞君英宗治平五年加封義勇武安王明隆慶元年三月封義勇武安英濟王崇甯至道眞君南極協天顯威大帝當今聖明天子欽念忠義醮聞玉帝詔行天下於萬厯四十二年甲寅加封三界伏魔大帝神威遠震天尊關聖帝君辭曹操書竊以日在天之上心在人之内日在天之上普照萬方心在人之内以表丹誠丹誠者信義也羽昔有言主存則歸主亡則輔新受曹公之寵顧久䝉劉主之恩光丞相新恩劉主舊義恩有所報義無可斷今主之音羽幸已知望形立相覓跡求功刺顔良於白馬誅文醜於南坡丞相厚恩滿有所報每留所賜之資盡在府庫緘封伏望台慈俯垂照鑑附錄贊歌漢夀亭義且武冠三軍振華夏斬讐將報知者身不可留臣有主老瞞不追猶有度誰其讐者吳陸吕𡻕十二月侯出走吳人縛侯生縛虎生縛虎死猶怒髯如䖝乚眼如炬吁嗟漢乎天不祚有馬不踐中原土侯身雖亡神萬古華葢殿大學士長沙李東陽撰王之廟兮何所枕崇岡兮俯遙浦左旗張兮右懸鼓王廟兮儼然主中處兮神在天從昭烈兮日周旋邦之人兮聚止𡻕春秋兮奉王祀牲牷肥兮酒醴旨王自天兮來下靑龍刀兮赤兎馬長髯飄兮顔渥赭王至兮入廟鐃鼓喧兮管噭噪飮且食兮不嚬以笑於嗟兮明神下爲河岳兮上爲星辰伊降福兮獨此邦之人扶天常兮植人紀億萬年兮相我天子秩廟祀兮自今爲始建極殿大學士華亭徐階撰昻然之容皎日英風浩然之氣際天薄地韜略出於春秋武勇本諸仁義提兵肆伐威靈膽落羣奸秉燭一宵淸烈名流率土噫帝神在天一日千古萬世綱常八方尊爼忠義有經昭兹文武公如日月何今何古東閣大學士昭武吳道南撰一釰方二寸上有大環徑四寸下連四環皆係印上共重一斤
